name: Build Windows ARM64

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build (branch, tag, or SHA)'
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: build-windows-arm64-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.12.3
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-${{ runner.arch }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-pnpm-store-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc

      - name: Cache Cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-cargo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend assets
        run: pnpm run build:renderer

      - name: Build Windows ARM64 executable
        shell: pwsh
        run: cargo build --manifest-path src-tauri/Cargo.toml --release --target aarch64-pc-windows-msvc

      - name: Prepare Windows ARM64 artifacts
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $releaseDir = 'release-assets'
          $portableDir = Join-Path $releaseDir 'cc-switch-windows-arm64-portable'
          $exePath = 'src-tauri/target/aarch64-pc-windows-msvc/release/cc-switch.exe'

          if (-not (Test-Path $exePath)) {
            throw "ARM64 executable not found: $exePath"
          }

          New-Item -ItemType Directory -Force -Path $portableDir | Out-Null
          Copy-Item $exePath $portableDir

          @(
            '# CC Switch portable build marker'
            'portable=true'
          ) | Set-Content -Path (Join-Path $portableDir 'portable.ini') -Encoding UTF8

          Copy-Item $exePath (Join-Path $releaseDir 'cc-switch-windows-arm64.exe')

          $zipPath = Join-Path $releaseDir 'cc-switch-windows-arm64-portable.zip'
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          Compress-Archive -Path "$portableDir/*" -DestinationPath $zipPath -Force

      - name: Upload Windows ARM64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cc-switch-windows-arm64
          path: release-assets/*
          if-no-files-found: error
